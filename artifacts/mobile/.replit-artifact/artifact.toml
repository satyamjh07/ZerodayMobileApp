kind = "mobile"
previewPath = "/"
title = "Study Aura"
version = "1.0.0"
id = "artifacts/mobile"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
name = "expo"
paths = [ "/" ]
localPort = 18115

[services.development]
run = "cd /home/runner/workspace/artifacts/mobile && PORT=18115 npm run start"

[services.production]
build = [ "pnpm", "--filter", "@workspace/mobile", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/mobile", "run", "serve" ]

[services.env]
PORT = "18115"
BASE_PATH = "/"
